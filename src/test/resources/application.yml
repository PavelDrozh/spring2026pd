spring:
  application:
    locale: ru-RU #en-US
    name: spring2026pd
  shell:
    interactive:
      enabled: true
  datasource:
    url: jdbc:h2:file:./db/filmorate;SCHEMA=PUBLIC
    username: sa
    password: password
    driver-class-name: org.h2.Driver
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      data-locations: optional:classpath:data.sql
jwt:
  private.key: classpath:app.key
  public.key: classpath:app.pub
  issuer: spring2026pd
  access-ttl-minutes: 30
genres-service:
  base-url: ${GENRES_SERVICE_BASE_URL:http://localhost:7082}