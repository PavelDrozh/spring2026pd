services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1

  kafbat-ui:
    container_name: kafbat-ui0
    image: ghcr.io/kafbat/kafka-ui:latest
    ports:
      - "7083:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    depends_on:
      - zookeeper
      - kafka
  spring2026pd:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      SERVICE_PORT: 7081
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/postgres?currentSchema=public
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      GENRES_SERVICE_BASE_URL: http://genres-service:7082
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_GENRE_CREATE_TOPIC: genre.create
    ports:
      - "7081:7081"
    depends_on:
      postgres:
        condition: service_healthy
      genres-service:
        condition: service_started
      kafka:
        condition: service_started
  genres-service:
    build:
      context: ./genres-service
      dockerfile: Dockerfile
    environment:
      GENRES_SERVICE_PORT: 7082
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/postgres?currentSchema=public
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_GENRE_CREATE_TOPIC: genre.create
    ports:
      - "7082:7082"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
  postgres:
    image: "postgres:17"
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=db
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d postgres" ]
      interval: 5s
      timeout: 3s
      retries: 20